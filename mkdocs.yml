site_name: Smart City
site_description: Product documentation for delivery, engineering, QA, operations, and support
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font: false

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - How-to Catalog: how-to.md
  - Product:
      - Overview: product/index.md
      - Functional Specs: product/functional-specs.md
      - GitLab Execution Hub: product/gitlab-hub.md
      - Design and UX: product/design.md
      - BRS Reference: product/brs-reference.md
      - Contribution Guide: product/contribution.md
  - Engineering:
      - Overview: engineering/index.md
      - System Architecture: engineering/architecture.md
      - Module Registry: engineering/registry.md
      - Environments and Deployment: engineering/environments.md
      - ADRs: engineering/adr/index.md
  - QA:
      - Overview: qa/index.md
      - Strategy and Test Plans: qa/strategy.md
      - Test Environments and Mock Data: qa/environments.md
      - Automated Test Reports: qa/reports.md
  - Operations:
      - Overview: operations/index.md
      - SOPs: operations/sops/index.md
      - Runbooks: operations/runbooks/index.md
      - Critical Incident: operations/runbooks/critical-incident.md
      - Controls: operations/controls/index.md
      - Monitoring Dashboards: operations/monitoring.md
      - Incident Management: operations/incidents.md
  - Governance:
      - Overview: governance/index.md
      - Onboarding Guide: governance/onboarding.md
      - Compliance and Security: governance/compliance.md
      - Team and Meetings: governance/team.md
  - Templates:
      - Overview: doc-templates/index.md
      - Metadata: doc-templates/metadata-template.md
      - Feature: doc-templates/template-feature.md
      - Runbook: doc-templates/template-runbook.md
      - ADR: doc-templates/template-adr.md
      - How-to: doc-templates/template-how-to.md
      - Service: doc-templates/template-service.md
