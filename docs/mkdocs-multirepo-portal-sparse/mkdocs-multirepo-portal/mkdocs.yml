site_name: Enterprise Documentation
site_description: Federated documentation portal built from private GitLab repositories
site_dir: public

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest

plugins:
  - search
  - monorepo

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Standards:
      - Overview: standards/index.md
  - Applications:
      - Application A: "!include ./imported/application-a/mkdocs.yml"
      - Application B: "!include ./imported/application-b/documentation/mkdocs.yml"
  - Support:
      - Overview: support/index.md
